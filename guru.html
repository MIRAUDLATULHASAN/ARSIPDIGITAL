<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru - Arsip Digital MI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #f3e8ff 100%); }
        
        /* Sidebar Styles */
        .sidebar-gradient { background: linear-gradient(180deg, #f093fb 0%, #f5576c 100%); }
        .nav-item { color: rgba(255,255,255,0.8); transition: all 0.3s ease; border-radius: 12px; margin: 4px 0; }
        .nav-item:hover { background: rgba(255,255,255,0.2); color: white; transform: translateX(5px); }
        .nav-item.active { background: rgba(255,255,255,0.25); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Button Styles */
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(245,87,108,0.4); }
        .btn-outline { border: 1.5px solid #fbcfe8; background: white; transition: all 0.3s ease; }
        .btn-outline:hover { border-color: #f5576c; background: #fdf2f8; }
        
        /* Table Styles */
        .data-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .data-table th { background: #fdf2f8; padding: 14px 16px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #fce7f3; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid #fce7f3; }
        .data-table tr:hover td { background: #fdf2f8; }
        
        /* Mapel Badge */
        .mapel-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; background: linear-gradient(135deg, #f093fb20, #f5576c20); color: #be185d; }
        
        /* Skeleton Loading */
        .skeleton-row { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 52px; margin-bottom: 8px; border-radius: 12px; }
        .skeleton-table { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 400px; border-radius: 16px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Modal Animation */
        .modal-show { animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Action Buttons */
        .btn-edit { background: #3b82f6; color: white; padding: 6px 14px; border-radius: 8px; transition: all 0.2s; }
        .btn-edit:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-delete { background: #ef4444; color: white; padding: 6px 14px; border-radius: 8px; transition: all 0.2s; }
        .btn-delete:hover { background: #dc2626; transform: translateY(-1px); }
        
        /* Card */
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        
        /* Stats Card */
        .stat-card { background: white; border-radius: 1rem; padding: 1rem; border: 1px solid #fce7f3; transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px -8px rgba(245,87,108,0.2); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; width: 280px; }
            .sidebar.active { transform: translateX(0); }
            .ml-72 { margin-left: 0; }
            .data-table th, .data-table td { padding: 10px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- ================================================== -->
        <!-- SIDEBAR -->
        <!-- ================================================== -->
        <div id="sidebar" class="sidebar-gradient w-72 fixed h-full z-20 transition-all duration-300 shadow-xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8 pb-4 border-b border-white/20">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="archive" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-white font-bold text-lg">Arsip Digital</h2>
                        <p class="text-pink-200 text-xs">MIS Raudlatul Hasan</p>
                    </div>
                </div>
                <nav class="space-y-1">
                    <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
                    </a>
                    <a href="siswa.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="users" class="w-5 h-5"></i><span>Data Siswa</span>
                    </a>
                    <a href="guru.html" class="nav-item active flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="chalkboard-user" class="w-5 h-5"></i><span>Data Guru</span>
                    </a>
                    <a href="arsip.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="folder-archive" class="w-5 h-5"></i><span>Arsip Berkas</span>
                    </a>
                    <a href="users.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="users-round" class="w-5 h-5"></i><span>Manajemen User</span>
                    </a>
                    <a href="pengaturan.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="settings" class="w-5 h-5"></i><span>Pengaturan</span>
                    </a>
                    <hr class="my-4 border-white/20">
                    <a href="#" id="logoutBtn" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- ================================================== -->
        <!-- MAIN CONTENT -->
        <!-- ================================================== -->
        <div class="flex-1 ml-72 overflow-y-auto">
            <!-- Top Bar -->
            <div class="sticky top-0 z-10 bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 flex justify-between items-center flex-wrap gap-3">
                <div class="flex items-center gap-3">
                    <button id="menuToggle" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition">
                        <i data-lucide="menu" class="w-6 h-6 text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Data Guru</h1>
                        <p class="text-sm text-gray-500">Kelola data guru dan tenaga pendidik MIS Raudlatul Hasan</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Cari guru..." class="pl-10 pr-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 w-64">
                    </div>
                </div>
            </div>
            
            <!-- Content -->
            <div class="p-6">
                <!-- Stats Cards Ringkasan -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6" id="statsGrid">
                    <div class="skeleton-row" style="height: 80px;"></div>
                    <div class="skeleton-row" style="height: 80px;"></div>
                    <div class="skeleton-row" style="height: 80px;"></div>
                </div>
                
                <!-- Action Bar -->
                <div class="flex justify-between items-center flex-wrap gap-4 mb-6">
                    <div class="flex gap-3">
                        <button onclick="exportToExcel()" class="btn-outline px-4 py-2 rounded-xl flex items-center gap-2">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export Excel
                        </button>
                    </div>
                    <button onclick="openTambahModal()" class="btn-gradient px-5 py-2 rounded-xl text-white flex items-center gap-2 shadow-md">
                        <i data-lucide="plus" class="w-4 h-4"></i> Tambah Guru
                    </button>
                </div>
                
                <!-- Table Card -->
                <div class="card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th class="text-center w-16">No</th>
                                    <th>Nama Guru</th>
                                    <th>NIP</th>
                                    <th>Mata Pelajaran</th>
                                    <th>No HP</th>
                                    <th>Tahun Mengajar</th>
                                    <th class="text-center w-32">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="guruTableBody">
                                <tr><td colspan="7"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================== -->
    <!-- MODAL TAMBAH/EDIT GURU -->
    <!-- ================================================== -->
    <div id="guruModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md modal-show">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800" id="modalTitle">Tambah Guru</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="guruForm">
                <input type="hidden" id="guruId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">Nama Lengkap *</label>
                        <input type="text" id="nama" placeholder="Contoh: Dr. H. Muhammad Ali, M.Pd" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">NIP</label>
                        <input type="text" id="nip" placeholder="Nomor Induk Pegawai" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">Mata Pelajaran *</label>
                        <input type="text" id="mapel" placeholder="Contoh: Matematika, Bahasa Indonesia, IPA" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-1 text-sm">No HP</label>
                            <input type="tel" id="nohp" placeholder="081234567890" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-1 text-sm">Tahun Mengajar</label>
                            <input type="number" id="tahun" placeholder="2005" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 btn-gradient py-2 rounded-xl text-white font-semibold">Simpan</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 py-2 rounded-xl font-semibold hover:bg-gray-200 transition">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================================================
        // KONFIGURASI
        // ==================================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbztfVmNSZo4TaD3bww03qIEZKTZNRgbKtvcK5RPmY81fkUkriMVDW4ocPnSU2hEOWIBDA/exec';
        const STORAGE_KEY = 'guru_data_cache';
        
        // Cek login
        if (!localStorage.getItem('arsip_auth')) {
            window.location.href = 'index.html';
        }
        
        // Global variables
        let allGuru = [];
        
        // ==================================================
        // LOAD DATA DENGAN CACHE
        // ==================================================
        async function loadGuru() {
            // Load dari cache dulu (INSTANT)
            const cached = localStorage.getItem(STORAGE_KEY);
            if (cached) {
                allGuru = JSON.parse(cached);
                renderTable();
                renderStats();
            }
            
            // Load dari API di background
            try {
                const response = await fetch(`${API_URL}?action=getGuru`);
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    allGuru = result.data;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allGuru));
                    renderTable();
                    renderStats();
                }
            } catch (error) {
                console.log('API offline, menggunakan cache');
                // Jika cache kosong, gunakan data default
                if (!cached || allGuru.length === 0) {
                    allGuru = [
                        { id: 1, nama: 'Dr. H. Muhammad Ali, M.Pd', nip: '196501011990031001', mapel: 'Matematika', nohp: '081234567890', tahun: '2005' },
                        { id: 2, nama: 'Hj. Siti Fatimah, S.Ag', nip: '196702021992032002', mapel: 'Pendidikan Agama', nohp: '081234567891', tahun: '2008' },
                        { id: 3, nama: 'Drs. H. Ahmad Zaini, M.Pd', nip: '196803031994031003', mapel: 'Bahasa Indonesia', nohp: '081234567892', tahun: '2010' }
                    ];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allGuru));
                    renderTable();
                    renderStats();
                }
            }
        }
        
        // ==================================================
        // RENDER STATISTIK
        // ==================================================
        function renderStats() {
            const totalGuru = allGuru.length;
            const totalMapel = [...new Set(allGuru.map(g => g.mapel))].length;
            const rataTahun = Math.round(allGuru.reduce((sum, g) => sum + (parseInt(g.tahun) || 0), 0) / totalGuru) || 0;
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card flex items-center gap-4">
                    <div class="w-12 h-12 bg-pink-100 rounded-xl flex items-center justify-center">
                        <i data-lucide="users" class="w-6 h-6 text-pink-500"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Total Guru</p>
                        <p class="text-2xl font-bold text-gray-800">${totalGuru}</p>
                    </div>
                </div>
                <div class="stat-card flex items-center gap-4">
                    <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                        <i data-lucide="book-open" class="w-6 h-6 text-purple-500"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Mata Pelajaran</p>
                        <p class="text-2xl font-bold text-gray-800">${totalMapel}</p>
                    </div>
                </div>
                <div class="stat-card flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                        <i data-lucide="calendar" class="w-6 h-6 text-blue-500"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Rata-rata Mulai Mengajar</p>
                        <p class="text-2xl font-bold text-gray-800">${rataTahun || '-'}</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }
        
        // ==================================================
        // RENDER TABLE
        // ==================================================
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredGuru = allGuru.filter(guru => {
                return guru.nama.toLowerCase().includes(searchTerm) || 
                       (guru.mapel && guru.mapel.toLowerCase().includes(searchTerm)) ||
                       (guru.nip && guru.nip.includes(searchTerm));
            });
            
            const tbody = document.getElementById('guruTableBody');
            
            if (filteredGuru.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-12 text-gray-500">
                            <i data-lucide="user-search" class="w-12 h-12 mx-auto mb-3 text-gray-300"></i>
                            <p>Tidak ada data guru</p>
                            <button onclick="openTambahModal()" class="mt-3 text-pink-500 text-sm hover:underline">Tambah guru baru</button>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }
            
            tbody.innerHTML = filteredGuru.map((guru, index) => `
                <tr class="hover:bg-pink-50/50 transition">
                    <td class="text-center">${index + 1}</td>
                    <td class="font-medium">${escapeHtml(guru.nama)}</td>
                    <td class="font-mono text-sm">${guru.nip || '-'}</td>
                    <td><span class="mapel-badge">${escapeHtml(guru.mapel)}</span></td>
                    <td>${guru.nohp || '-'}</td>
                    <td>${guru.tahun || '-'}</td>
                    <td class="text-center">
                        <button onclick="editGuru(${guru.id})" class="btn-edit mr-1 text-sm px-3 py-1">
                            <i data-lucide="edit-2" class="w-3 h-3 inline"></i> Edit
                        </button>
                        <button onclick="deleteGuru(${guru.id})" class="btn-delete text-sm px-3 py-1">
                            <i data-lucide="trash-2" class="w-3 h-3 inline"></i> Hapus
                        </button>
                    </td>
                </tr>
            `).join('');
            
            lucide.createIcons();
        }
        
        // ==================================================
        // CRUD OPERATIONS
        // ==================================================
        function openTambahModal() {
            document.getElementById('modalTitle').innerText = 'Tambah Guru';
            document.getElementById('guruForm').reset();
            document.getElementById('guruId').value = '';
            document.getElementById('guruModal').classList.remove('hidden');
            document.getElementById('guruModal').classList.add('flex');
            lucide.createIcons();
        }
        
        function editGuru(id) {
            const guru = allGuru.find(g => g.id == id);
            if (guru) {
                document.getElementById('modalTitle').innerText = 'Edit Guru';
                document.getElementById('guruId').value = guru.id;
                document.getElementById('nama').value = guru.nama;
                document.getElementById('nip').value = guru.nip || '';
                document.getElementById('mapel').value = guru.mapel;
                document.getElementById('nohp').value = guru.nohp || '';
                document.getElementById('tahun').value = guru.tahun || '';
                document.getElementById('guruModal').classList.remove('hidden');
                document.getElementById('guruModal').classList.add('flex');
                lucide.createIcons();
            }
        }
        
        function closeModal() {
            document.getElementById('guruModal').classList.add('hidden');
            document.getElementById('guruModal').classList.remove('flex');
        }
        
        async function saveGuruToAPI(guruData) {
            try {
                const response = await fetch(`${API_URL}?action=saveGuru`, {
                    method: 'POST',
                    body: JSON.stringify(guruData)
                });
                return await response.json();
            } catch (e) {
                return { success: false };
            }
        }
        
        async function deleteGuruFromAPI(id) {
            try {
                const response = await fetch(`${API_URL}?action=deleteGuru&id=${id}`);
                return await response.json();
            } catch (e) {
                return { success: false };
            }
        }
        
        document.getElementById('guruForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('guruId').value;
            const guruData = {
                id: id || Date.now(),
                nama: document.getElementById('nama').value,
                nip: document.getElementById('nip').value,
                mapel: document.getElementById('mapel').value,
                nohp: document.getElementById('nohp').value,
                tahun: document.getElementById('tahun').value
            };
            
            // Simpan ke API (background)
            const result = await saveGuruToAPI(guruData);
            
            // Simpan ke lokal
            if (id) {
                const index = allGuru.findIndex(g => g.id == id);
                if (index !== -1) {
                    allGuru[index] = { ...allGuru[index], ...guruData };
                }
            } else {
                allGuru.push(guruData);
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allGuru));
            closeModal();
            renderTable();
            renderStats();
            
            showToast(result.success ? 'Data guru berhasil disimpan!' : 'Data disimpan secara lokal', result.success ? 'success' : 'warning');
        });
        
        async function deleteGuru(id) {
            if (confirm('Apakah Anda yakin ingin menghapus data guru ini? Tindakan ini tidak dapat dibatalkan.')) {
                const result = await deleteGuruFromAPI(id);
                allGuru = allGuru.filter(g => g.id != id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allGuru));
                renderTable();
                renderStats();
                showToast('Data guru berhasil dihapus!', 'success');
            }
        }
        
        // ==================================================
        // EXPORT TO EXCEL
        // ==================================================
        function exportToExcel() {
            const headers = ['No', 'Nama Guru', 'NIP', 'Mata Pelajaran', 'No HP', 'Tahun Mengajar'];
            const rows = allGuru.map((guru, index) => [
                index + 1,
                guru.nama,
                guru.nip || '',
                guru.mapel,
                guru.nohp || '',
                guru.tahun || ''
            ]);
            
            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_guru_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data berhasil diekspor!', 'success');
        }
        
        // ==================================================
        // HELPER FUNCTIONS
        // ==================================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-5 py-3 rounded-xl text-white font-medium z-50 shadow-lg transition-all duration-300 ${
                type === 'success' ? 'bg-green-500' : 'bg-orange-500'
            }`;
            toast.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${message}</span></div>`;
            document.body.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ==================================================
        // EVENT LISTENERS
        // ==================================================
        document.getElementById('searchInput').addEventListener('input', () => {
            renderTable();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });
        
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });
        
        // ==================================================
        // INITIALIZE
        // ==================================================
        loadGuru();
        lucide.createIcons();
    </script>
