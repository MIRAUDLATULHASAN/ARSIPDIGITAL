<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa - Arsip Digital MI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #f3e8ff 100%); }
        
        /* Sidebar Styles */
        .sidebar-gradient { background: linear-gradient(180deg, #f093fb 0%, #f5576c 100%); }
        .nav-item { color: rgba(255,255,255,0.8); transition: all 0.3s ease; border-radius: 12px; margin: 4px 0; }
        .nav-item:hover { background: rgba(255,255,255,0.2); color: white; transform: translateX(5px); }
        .nav-item.active { background: rgba(255,255,255,0.25); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Button Styles */
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(245,87,108,0.4); }
        .btn-outline { border: 1.5px solid #fbcfe8; background: white; transition: all 0.3s ease; }
        .btn-outline:hover { border-color: #f5576c; background: #fdf2f8; }
        
        /* Table Styles */
        .data-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .data-table th { background: #fdf2f8; padding: 14px 16px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #fce7f3; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid #fce7f3; }
        .data-table tr:hover td { background: #fdf2f8; }
        
        /* Skeleton Loading */
        .skeleton-row { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 52px; margin-bottom: 8px; border-radius: 12px; }
        .skeleton-table { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 400px; border-radius: 16px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Modal Animation */
        .modal-show { animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Pagination */
        .pagination-btn { padding: 8px 14px; margin: 0 4px; border-radius: 10px; transition: all 0.2s; cursor: pointer; font-weight: 500; }
        .pagination-btn.active { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; box-shadow: 0 2px 8px rgba(245,87,108,0.3); }
        .pagination-btn:hover:not(.active) { background: #fce7f3; transform: translateY(-2px); }
        
        /* Action Buttons */
        .btn-edit { background: #3b82f6; color: white; padding: 6px 14px; border-radius: 8px; transition: all 0.2s; }
        .btn-edit:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-delete { background: #ef4444; color: white; padding: 6px 14px; border-radius: 8px; transition: all 0.2s; }
        .btn-delete:hover { background: #dc2626; transform: translateY(-1px); }
        
        /* Card */
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; width: 280px; }
            .sidebar.active { transform: translateX(0); }
            .ml-72 { margin-left: 0; }
            .data-table th, .data-table td { padding: 10px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- ================================================== -->
        <!-- SIDEBAR -->
        <!-- ================================================== -->
        <div id="sidebar" class="sidebar-gradient w-72 fixed h-full z-20 transition-all duration-300 shadow-xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8 pb-4 border-b border-white/20">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="archive" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-white font-bold text-lg">Arsip Digital</h2>
                        <p class="text-pink-200 text-xs">MIS Raudlatul Hasan</p>
                    </div>
                </div>
                <nav class="space-y-1">
                    <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
                    </a>
                    <a href="siswa.html" class="nav-item active flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="users" class="w-5 h-5"></i><span>Data Siswa</span>
                    </a>
                    <a href="guru.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="chalkboard-user" class="w-5 h-5"></i><span>Data Guru</span>
                    </a>
                    <a href="arsip.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="folder-archive" class="w-5 h-5"></i><span>Arsip Berkas</span>
                    </a>
                    <a href="users.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="users-round" class="w-5 h-5"></i><span>Manajemen User</span>
                    </a>
                    <a href="pengaturan.html" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="settings" class="w-5 h-5"></i><span>Pengaturan</span>
                    </a>
                    <hr class="my-4 border-white/20">
                    <a href="#" id="logoutBtn" class="nav-item flex items-center gap-3 px-4 py-3 transition">
                        <i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- ================================================== -->
        <!-- MAIN CONTENT -->
        <!-- ================================================== -->
        <div class="flex-1 ml-72 overflow-y-auto">
            <!-- Top Bar -->
            <div class="sticky top-0 z-10 bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 flex justify-between items-center flex-wrap gap-3">
                <div class="flex items-center gap-3">
                    <button id="menuToggle" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition">
                        <i data-lucide="menu" class="w-6 h-6 text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Data Siswa</h1>
                        <p class="text-sm text-gray-500">Kelola data siswa MIS Raudlatul Hasan</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Cari siswa..." class="pl-10 pr-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 w-64">
                    </div>
                </div>
            </div>
            
            <!-- Content -->
            <div class="p-6">
                <!-- Filter & Action Bar -->
                <div class="flex justify-between items-center flex-wrap gap-4 mb-6">
                    <div class="flex gap-3">
                        <select id="filterKelas" class="px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white">
                            <option value="">📚 Semua Kelas</option>
                            <option value="1">Kelas 1</option>
                            <option value="2">Kelas 2</option>
                            <option value="3">Kelas 3</option>
                            <option value="4">Kelas 4</option>
                            <option value="5">Kelas 5</option>
                            <option value="6">Kelas 6</option>
                        </select>
                        <button onclick="exportToExcel()" class="btn-outline px-4 py-2 rounded-xl flex items-center gap-2">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export Excel
                        </button>
                    </div>
                    <button onclick="openTambahModal()" class="btn-gradient px-5 py-2 rounded-xl text-white flex items-center gap-2 shadow-md">
                        <i data-lucide="plus" class="w-4 h-4"></i> Tambah Siswa
                    </button>
                </div>
                
                <!-- Table Card -->
                <div class="card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th class="text-center w-16">No</th>
                                    <th>Nama Siswa</th>
                                    <th>NISN</th>
                                    <th>Kelas</th>
                                    <th>JK</th>
                                    <th>Alamat</th>
                                    <th>Nama Wali</th>
                                    <th class="text-center w-32">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="siswaTableBody">
                                <tr><td colspan="8"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <div id="pagination" class="px-6 py-4 border-t border-pink-100 flex justify-between items-center bg-gray-50/30"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================== -->
    <!-- MODAL TAMBAH/EDIT SISWA -->
    <!-- ================================================== -->
    <div id="siswaModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md modal-show">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800" id="modalTitle">Tambah Siswa</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="siswaForm">
                <input type="hidden" id="siswaId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">Nama Lengkap *</label>
                        <input type="text" id="nama" placeholder="Contoh: Ahmad Fathoni" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">NISN *</label>
                        <input type="text" id="nisn" placeholder="Nomor Induk Siswa Nasional" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-1 text-sm">Kelas *</label>
                            <select id="kelas" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                                <option value="">Pilih</option>
                                <option value="1">Kelas 1</option>
                                <option value="2">Kelas 2</option>
                                <option value="3">Kelas 3</option>
                                <option value="4">Kelas 4</option>
                                <option value="5">Kelas 5</option>
                                <option value="6">Kelas 6</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-1 text-sm">Jenis Kelamin *</label>
                            <select id="jk" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" required>
                                <option value="">Pilih</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">Alamat</label>
                        <textarea id="alamat" rows="2" placeholder="Alamat lengkap siswa" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1 text-sm">Nama Wali</label>
                        <input type="text" id="wali" placeholder="Nama orang tua/wali" class="w-full px-4 py-2 border border-pink-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 btn-gradient py-2 rounded-xl text-white font-semibold">Simpan</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 py-2 rounded-xl font-semibold hover:bg-gray-200 transition">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================================================
        // KONFIGURASI
        // ==================================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbztfVmNSZo4TaD3bww03qIEZKTZNRgbKtvcK5RPmY81fkUkriMVDW4ocPnSU2hEOWIBDA/exec';
        const STORAGE_KEY = 'siswa_data_cache';
        
        // Cek login
        if (!localStorage.getItem('arsip_auth')) {
            window.location.href = 'index.html';
        }
        
        // Global variables
        let allSiswa = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let filteredSiswa = [];
        
        // ==================================================
        // LOAD DATA DENGAN CACHE
        // ==================================================
        async function loadSiswa() {
            // Load dari cache dulu (INSTANT)
            const cached = localStorage.getItem(STORAGE_KEY);
            if (cached) {
                allSiswa = JSON.parse(cached);
                renderTable();
            }
            
            // Load dari API di background
            try {
                const response = await fetch(`${API_URL}?action=getSiswa`);
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    allSiswa = result.data;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allSiswa));
                    renderTable();
                }
            } catch (error) {
                console.log('API offline, menggunakan cache');
                // Jika cache kosong, gunakan data default
                if (!cached || allSiswa.length === 0) {
                    allSiswa = [
                        { id: 1, nama: 'Ahmad Fathoni', nisn: '0012345678', kelas: '6', jk: 'L', alamat: 'Jl. Pendidikan No. 1', wali: 'Budi Santoso' },
                        { id: 2, nama: 'Siti Aisyah', nisn: '0012345679', kelas: '5', jk: 'P', alamat: 'Jl. Madrasah No. 2', wali: 'Siti Aminah' },
                        { id: 3, nama: 'Muhammad Rizki', nisn: '0012345680', kelas: '4', jk: 'L', alamat: 'Jl. Merdeka No. 5', wali: 'Ahmad Zainuri' },
                        { id: 4, nama: 'Fatimah Azzahra', nisn: '0012345681', kelas: '3', jk: 'P', alamat: 'Jl. Kenangan No. 8', wali: 'Siti Maimunah' }
                    ];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allSiswa));
                    renderTable();
                }
            }
        }
        
        // ==================================================
        // RENDER TABLE
        // ==================================================
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterKelas = document.getElementById('filterKelas').value;
            
            filteredSiswa = allSiswa.filter(siswa => {
                const matchSearch = siswa.nama.toLowerCase().includes(searchTerm) || 
                                   siswa.nisn.includes(searchTerm);
                const matchKelas = !filterKelas || siswa.kelas === filterKelas;
                return matchSearch && matchKelas;
            });
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageSiswa = filteredSiswa.slice(start, end);
            
            const tbody = document.getElementById('siswaTableBody');
            
            if (pageSiswa.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center py-12 text-gray-500">
                            <i data-lucide="user-search" class="w-12 h-12 mx-auto mb-3 text-gray-300"></i>
                            <p>Tidak ada data siswa</p>
                            <button onclick="openTambahModal()" class="mt-3 text-pink-500 text-sm hover:underline">Tambah siswa baru</button>
                        </td>
                    </tr>
                `;
                document.getElementById('pagination').innerHTML = '';
                lucide.createIcons();
                return;
            }
            
            tbody.innerHTML = pageSiswa.map((siswa, index) => `
                <tr class="hover:bg-pink-50/50 transition">
                    <td class="text-center">${start + index + 1}</td>
                    <td class="font-medium">${escapeHtml(siswa.nama)}</td>
                    <td>${siswa.nisn}</td>
                    <td><span class="px-2 py-1 bg-pink-100 text-pink-700 rounded-lg text-xs font-semibold">Kelas ${siswa.kelas}</span></td>
                    <td>${siswa.jk === 'L' ? '👨‍🎓 Laki-laki' : '👩‍🎓 Perempuan'}</td>
                    <td class="max-w-xs truncate">${siswa.alamat || '-'}</td>
                    <td>${siswa.wali || '-'}</td>
                    <td class="text-center">
                        <button onclick="editSiswa(${siswa.id})" class="btn-edit mr-1 text-sm px-3 py-1">
                            <i data-lucide="edit-2" class="w-3 h-3 inline"></i> Edit
                        </button>
                        <button onclick="deleteSiswa(${siswa.id})" class="btn-delete text-sm px-3 py-1">
                            <i data-lucide="trash-2" class="w-3 h-3 inline"></i> Hapus
                        </button>
                    </td>
                </tr>
            `).join('');
            
            renderPagination();
            lucide.createIcons();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredSiswa.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '<div class="flex items-center gap-1">';
            html += `<span class="text-sm text-gray-500 mr-3">Total ${filteredSiswa.length} data</span>`;
            
            // Previous button
            if (currentPage > 1) {
                html += `<button onclick="goToPage(${currentPage - 1})" class="pagination-btn bg-white border border-pink-200 hover:bg-pink-50">«</button>`;
            }
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button onclick="goToPage(${i})" class="pagination-btn ${i === currentPage ? 'active' : 'bg-white border border-pink-200 hover:bg-pink-50'}">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="px-2 text-gray-400">...</span>`;
                }
            }
            
            // Next button
            if (currentPage < totalPages) {
                html += `<button onclick="goToPage(${currentPage + 1})" class="pagination-btn bg-white border border-pink-200 hover:bg-pink-50">»</button>`;
            }
            
            html += '</div>';
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderTable();
        }
        
        // ==================================================
        // CRUD OPERATIONS
        // ==================================================
        function openTambahModal() {
            document.getElementById('modalTitle').innerText = 'Tambah Siswa';
            document.getElementById('siswaForm').reset();
            document.getElementById('siswaId').value = '';
            document.getElementById('siswaModal').classList.remove('hidden');
            document.getElementById('siswaModal').classList.add('flex');
            lucide.createIcons();
        }
        
        function editSiswa(id) {
            const siswa = allSiswa.find(s => s.id == id);
            if (siswa) {
                document.getElementById('modalTitle').innerText = 'Edit Siswa';
                document.getElementById('siswaId').value = siswa.id;
                document.getElementById('nama').value = siswa.nama;
                document.getElementById('nisn').value = siswa.nisn;
                document.getElementById('kelas').value = siswa.kelas;
                document.getElementById('jk').value = siswa.jk;
                document.getElementById('alamat').value = siswa.alamat || '';
                document.getElementById('wali').value = siswa.wali || '';
                document.getElementById('siswaModal').classList.remove('hidden');
                document.getElementById('siswaModal').classList.add('flex');
                lucide.createIcons();
            }
        }
        
        function closeModal() {
            document.getElementById('siswaModal').classList.add('hidden');
            document.getElementById('siswaModal').classList.remove('flex');
        }
        
        async function saveSiswaToAPI(siswaData) {
            try {
                const response = await fetch(`${API_URL}?action=saveSiswa`, {
                    method: 'POST',
                    body: JSON.stringify(siswaData)
                });
                return await response.json();
            } catch (e) {
                return { success: false };
            }
        }
        
        async function deleteSiswaFromAPI(id) {
            try {
                const response = await fetch(`${API_URL}?action=deleteSiswa&id=${id}`);
                return await response.json();
            } catch (e) {
                return { success: false };
            }
        }
        
        document.getElementById('siswaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('siswaId').value;
            const siswaData = {
                id: id || Date.now(),
                nama: document.getElementById('nama').value,
                nisn: document.getElementById('nisn').value,
                kelas: document.getElementById('kelas').value,
                jk: document.getElementById('jk').value,
                alamat: document.getElementById('alamat').value,
                wali: document.getElementById('wali').value
            };
            
            // Simpan ke API (background)
            const result = await saveSiswaToAPI(siswaData);
            
            // Simpan ke lokal
            if (id) {
                const index = allSiswa.findIndex(s => s.id == id);
                if (index !== -1) {
                    allSiswa[index] = { ...allSiswa[index], ...siswaData };
                }
            } else {
                allSiswa.push(siswaData);
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allSiswa));
            closeModal();
            renderTable();
            
            showToast(result.success ? 'Data berhasil disimpan!' : 'Data disimpan secara lokal', result.success ? 'success' : 'warning');
        });
        
        async function deleteSiswa(id) {
            if (confirm('Apakah Anda yakin ingin menghapus data siswa ini? Tindakan ini tidak dapat dibatalkan.')) {
                const result = await deleteSiswaFromAPI(id);
                allSiswa = allSiswa.filter(s => s.id != id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allSiswa));
                renderTable();
                showToast('Data berhasil dihapus!', 'success');
            }
        }
        
        // ==================================================
        // EXPORT TO EXCEL
        // ==================================================
        function exportToExcel() {
            const headers = ['No', 'Nama Siswa', 'NISN', 'Kelas', 'Jenis Kelamin', 'Alamat', 'Nama Wali'];
            const rows = filteredSiswa.map((siswa, index) => [
                index + 1,
                siswa.nama,
                siswa.nisn,
                `Kelas ${siswa.kelas}`,
                siswa.jk === 'L' ? 'Laki-laki' : 'Perempuan',
                siswa.alamat || '',
                siswa.wali || ''
            ]);
            
            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_siswa_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data berhasil diekspor!', 'success');
        }
        
        // ==================================================
        // HELPER FUNCTIONS
        // ==================================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-5 py-3 rounded-xl text-white font-medium z-50 shadow-lg transition-all duration-300 ${
                type === 'success' ? 'bg-green-500' : 'bg-orange-500'
            }`;
            toast.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${message}</span></div>`;
            document.body.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ==================================================
        // EVENT LISTENERS
        // ==================================================
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            renderTable();
        });
        
        document.getElementById('filterKelas').addEventListener('change', () => {
            currentPage = 1;
            renderTable();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });
        
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });
        
        // ==================================================
        // INITIALIZE
        // ==================================================
        loadSiswa();
        lucide.createIcons();
    </script>
</body>
</html>
